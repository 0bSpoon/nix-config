keys:
  # ユーザーキー（age-keygen で生成し KeePass 等に保存）
  # 取得方法: nix shell nixpkgs#age --command age-keygen
  # 秘密鍵の配置先: ~/.config/sops/age/keys.txt (0600)
  - &admin age1gzkphg7c8lt2eylvwlxm4h6svcxzprfmjvrrejcj9ehyuzl8u4aqt5se9r

  # 新ホスト追加時の記載例:
  # - &host_zaun age1...

creation_rules:
  # 共通シークレット
  - path_regex: secrets/common\.yaml$
    key_groups:
      - age:
          - *admin

  # ユーザー固有シークレット
  - path_regex: secrets/users/.*\.yaml$
    key_groups:
      - age:
          - *admin

  # ホスト固有シークレット
  - path_regex: secrets/hosts/.*\.yaml$
    key_groups:
      - age:
          - *admin

  # 旧構成の互換ルール
  - path_regex: secrets/secrets\.yaml$
    key_groups:
      - age:
          - *admin
